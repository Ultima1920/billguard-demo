<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>BillGuard — AI Bill Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.25rem;

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;

      --radius-pill: 999px;
      --radius-lg: 1rem;

      --transition-fast: 180ms cubic-bezier(0.16, 1, 0.3, 1);

      --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    [data-theme="dark"] {
      --bg: #050608;
      --bg-alt: #0c0d11;
      --bg-panel: #111218;
      --bg-pill: rgba(15, 16, 22, 0.85);

      --border-subtle: #24262f;
      --border-strong: #2e313b;

      --text: #f9fafb;
      --text-soft: #9ca3af;
      --text-faint: #6b7280;

      --primary: #30dfa0;
      --primary-soft: rgba(48, 223, 160, 0.12);

      --danger: #f97373;
      --danger-soft: rgba(248, 113, 113, 0.12);

      --accent-pill: #f4f4f5;

      --shadow-soft: 0 24px 80px rgba(0, 0, 0, 0.7);
    }

    [data-theme="light"] {
      --bg: #f5f5f7;
      --bg-alt: #e5e7eb;
      --bg-panel: #ffffff;
      --bg-pill: rgba(255,255,255,0.96);

      --border-subtle: #d4d4d8;
      --border-strong: #9ca3af;

      --text: #111827;
      --text-soft: #6b7280;
      --text-faint: #9ca3af;

      --primary: #047857;
      --primary-soft: #d1fae5;

      --danger: #b91c1c;
      --danger-soft: #fee2e2;

      --accent-pill: #111827;

      --shadow-soft: 0 24px 70px rgba(15, 23, 42, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      background:
        radial-gradient(circle at top, #111827 0, var(--bg) 50%),
        repeating-radial-gradient(circle at center, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 3px);
      background-blend-mode: soft-light;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    img, svg {
      display: block;
      max-width: 100%;
    }

    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 3px;
      border-radius: 6px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Shell */

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: linear-gradient(to bottom, rgba(5,6,8,0.9), rgba(5,6,8,0.68));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 20% 20%, #ffffff 0, #d1fae5 30%, var(--primary-soft) 60%),
        conic-gradient(from 220deg, rgba(255,255,255,0.18), transparent 120deg, rgba(0,0,0,0.4) 200deg, transparent 280deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
      color: #020617;
    }

    .brand-mark svg {
      width: 16px;
      height: 16px;
    }

    .brand-text-main {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand-text-sub {
      font-size: var(--text-xs);
      color: var(--text-soft);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .pill-status {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-subtle);
      font-size: var(--text-xs);
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(15,23,42,0.5);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 4px rgba(48,223,160,0.18);
    }

    .theme-toggle {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      background: rgba(15,23,42,0.6);
      transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
    }

    .theme-toggle:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      color: var(--text);
    }

    /* Main Canvas */

    .canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6) var(--space-4);
    }

    .layout {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.9fr);
      gap: var(--space-6);
      align-items: stretch;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* Left: Visual canvas + pill */

    .visual {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.26);
      background:
        radial-gradient(circle at 20% 0, rgba(250,250,250,0.08), transparent 60%),
        radial-gradient(circle at 80% 90%, rgba(15,23,42,0.8), rgba(5,6,8,1));
      box-shadow: var(--shadow-soft);
      min-height: 360px;
    }

    .lines {
      position: absolute;
      inset: 0;
      opacity: 0.28;
      background-image:
        repeating-linear-gradient(
          to right,
          rgba(249,250,251,0.4) 0,
          rgba(249,250,251,0.4) 1px,
          transparent 1px,
          transparent 18px
        ),
        repeating-linear-gradient(
          to bottom,
          rgba(249,250,251,0.4) 0,
          rgba(249,250,251,0.4) 1px,
          transparent 1px,
          transparent 18px
        );
      mix-blend-mode: soft-light;
    }

    .visual-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: var(--space-6);
    }

    .pill {
      position: relative;
      border-radius: var(--radius-pill);
      background: var(--bg-pill);
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      padding: var(--space-2) var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      backdrop-filter: blur(16px);
      min-width: min(90%, 720px);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
    }

    .pill:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 26px 80px rgba(0,0,0,0.75);
    }

    .pill-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--accent-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #020617;
      flex-shrink: 0;
    }

    .pill-text {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill-text span {
      color: var(--text);
    }

    .pill-cta {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--accent-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #020617;
      flex-shrink: 0;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .pill:hover .pill-cta {
      transform: translateX(1px);
      box-shadow: 0 0 0 4px rgba(15,23,42,0.6);
    }

    #file-input {
      display: none;
    }

    /* Right: Result panel */

    .panel {
      border-radius: 24px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-panel);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      box-shadow: var(--shadow-soft);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .panel-title {
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .panel-sub {
      font-size: var(--text-xs);
      color: var(--text-soft);
    }

    .panel-badge {
      font-size: var(--text-xs);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148,163,184,0.4);
      color: var(--text-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .panel-badge span.dot-badge {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary);
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3,minmax(0,1fr));
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .summary-card {
      padding: var(--space-3);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: var(--bg-alt);
    }

    .summary-label {
      font-size: var(--text-xs);
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .summary-value {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      font-weight: 600;
    }

    .summary-value.danger { color: var(--danger); }
    .summary-value.safe { color: var(--primary); }

    .section {
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px dashed var(--border-subtle);
    }

    .section-label {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: var(--space-2);
    }

    .line-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }

    .line-table th {
      text-align: left;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      padding: var(--space-1) var(--space-2);
      border-bottom: 1px solid var(--border-subtle);
    }

    .line-table th:last-child { text-align: right; }
    .line-table td {
      padding: var(--space-2);
      border-bottom: 1px solid rgba(148,163,184,0.26);
      vertical-align: top;
    }
    .line-table td:last-child {
      text-align: right;
      font-family: var(--font-mono);
      font-weight: 600;
      white-space: nowrap;
    }
    .line-table tr:last-child td {
      border-bottom: none;
    }

    .note {
      font-size: var(--text-xs);
      color: var(--text-soft);
      margin-top: 2px;
    }

    .flags {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .flag-card {
      border-radius: var(--radius-lg);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--border-subtle);
      display: flex;
      gap: var(--space-2);
      align-items: flex-start;
    }

    .flag-card.high {
      background: var(--danger-soft);
      border-color: var(--danger);
    }

    .flag-card.medium {
      background: var(--primary-soft);
      border-color: rgba(5,150,105,0.6);
    }

    .flag-icon {
      margin-top: 2px;
    }

    .flag-title {
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .flag-desc {
      font-size: var(--text-xs);
      color: var(--text-soft);
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .step-item {
      display: flex;
      gap: var(--space-2);
      font-size: var(--text-sm);
    }

    .step-num {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: var(--text-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      color: var(--text);
      font-size: var(--text-sm);
    }

    /* Placeholder state when no results */

    .placeholder-text {
      font-size: var(--text-sm);
      color: var(--text-soft);
      margin-top: var(--space-2);
    }

    /* Error badge */

    .error-badge {
      font-size: var(--text-xs);
      color: var(--danger);
      margin-top: var(--space-2);
    }
  </style>
</head>

<body>
  <div class="shell">
    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V7.5L12 3 4 7.5V12c0 6 8 10 8 10z" />
            <path d="m9 12 2 2 4-4" />
          </svg>
        </div>
        <div>
          <div class="brand-text-main">BillGuard</div>
          <div class="brand-text-sub">Gemma 4 31B · Cerebras Inference</div>
        </div>
      </div>

      <div class="top-right">
        <div class="pill-status">
          <span class="dot"></span>
          <span id="status-label">Ready to analyze</span>
        </div>
        <button
          class="theme-toggle"
          type="button"
          aria-label="Toggle theme"
          data-theme-toggle
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- MAIN CANVAS -->
    <main class="canvas">
      <div class="layout">
        <!-- LEFT: visual + pill -->
        <section class="visual">
          <div class="lines"></div>
          <div class="visual-inner">
            <div
              class="pill"
              id="pill"
              onclick="document.getElementById('file-input').click()"
              ondragover="handleDragOver(event)"
              ondragleave="handleDragLeave(event)"
              ondrop="handleDrop(event)"
            >
              <div class="pill-icon">
                <i data-lucide="file-text"></i>
              </div>
              <div class="pill-text" id="pill-text">
                <span>Drop your bill</span> or click to select an image
              </div>
              <div class="pill-cta">
                <i data-lucide="play"></i>
              </div>
            </div>
            <input id="file-input" type="file" accept="image/*" onchange="handleFile(event)" />
          </div>
        </section>

        <!-- RIGHT: panel -->
        <section class="panel" id="panel">
          <div class="panel-header">
  <div>
    <div class="panel-title" id="panel-title">BillGuard dashboard</div>
    <div class="panel-sub" id="panel-sub">
      AI bill/invoice breakdown powered by Gemma 4 on Cerebras.
    </div>
  </div>
  <div class="panel-badge">
    <span class="dot-badge"></span>
    <span id="latency-label">Waiting for first run</span>
  </div>
</div>

          <p class="error-badge" id="error-badge" style="display:none;"></p>
        </section>
      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();

    // THEME
    (function () {
      const root = document.documentElement;
      const btn = document.querySelector("[data-theme-toggle]");
      let dark = true;
      root.setAttribute("data-theme", "dark");

      btn.addEventListener("click", () => {
        dark = !dark;
        root.setAttribute("data-theme", dark ? "dark" : "light");
        btn.innerHTML = dark
          ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      });
    })();

    let imageBase64 = "";
    let imageMime = "";

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById("pill").classList.add("drag-over");
    }

    function handleDragLeave(e) {
      document.getElementById("pill").classList.remove("drag-over");
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById("pill").classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        loadFile(file);
      }
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (file) loadFile(file);
    }

    function loadFile(file) {
      imageMime =
        file.type === "image/jpeg" ||
        file.type === "image/png" ||
        file.type === "image/gif"
          ? file.type
          : "image/jpeg";

      const reader = new FileReader();
      reader.onload = (evt) => {
        const raw = evt.target.result;
        imageBase64 = raw.split(",")[1];
        const pillText = document.getElementById("pill-text");
        pillText.innerHTML =
          "<span>" +
          file.name +
          "</span> · " +
          (file.size / 1024).toFixed(1) +
          " KB · click again to re‑select";
        analyzeBill();
      };
      reader.readAsDataURL(file);
    }

    async function analyzeBill() {
      if (!imageBase64) return;

      const status = document.getElementById("status-label");
      const pillText = document.getElementById("pill-text");
      const errorBadge = document.getElementById("error-badge");
      const placeholderText = document.getElementById("placeholder-text");

      errorBadge.style.display = "none";
      placeholderText.style.display = "none";

      pillText.innerHTML =
        "<span>Analyzing…</span> Gemma 4 31B on Cerebras is reading your bill";
      status.textContent = "Analyzing (Cerebras)…";

      try {
        const start = performance.now();
        const res = await fetch("/.netlify/functions/analyze-bill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mime_type: imageMime,
            data: imageBase64,
          }),
        });

        const elapsed = ((performance.now() - start) / 1000).toFixed(2);
        status.textContent = "Done in " + elapsed + "s";
        document.getElementById("latency-label").textContent =
  "Last response: " + elapsed + "s";

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || "API error " + res.status);
        }

        const json = await res.json();
        renderResult(json);
        pillText.innerHTML =
          "<span>Bill analyzed</span> · click to try another image";

      } catch (err) {
        console.error(err);
        errorBadge.style.display = "block";
        errorBadge.textContent =
          "Analysis failed: " + (err.message || "unknown error");
        pillText.innerHTML =
          "<span>Something went wrong.</span> Click to try again with a different bill.";
        status.textContent = "Error · see right panel";
      }
    }

    function renderResult(r) {
      const title = document.getElementById("panel-title");
      const sub = document.getElementById("panel-sub");

      const sumRow = document.getElementById("summary-row");
      const sumTotal = document.getElementById("sum-total");
      const sumSusp = document.getElementById("sum-suspicious");
      const sumItems = document.getElementById("sum-items");

      const sectionLines = document.getElementById("section-lines");
      const lineTable = document.getElementById("line-table");

      const sectionFlags = document.getElementById("section-flags");
      const flags = document.getElementById("flags");

      const sectionSteps = document.getElementById("section-steps");
      const steps = document.getElementById("steps");

      function esc(str) {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      title.textContent = r.bill_type || "Bill analysis";
      sub.textContent =
        (r.billing_period ? r.billing_period + " · " : "") +
        "Risk: " +
        (r.summary?.risk_level || "—");

      sumRow.style.display = "grid";
      sumTotal.textContent = esc(r.summary?.total_amount || "—");
      sumSusp.textContent = esc(r.summary?.suspicious_charges_total || "—");
      sumItems.textContent =
        r.summary?.line_items_count ||
        (Array.isArray(r.line_items) ? r.line_items.length : 0);

      if (r.line_items && r.line_items.length) {
        sectionLines.style.display = "block";
        let html = "<thead><tr><th>Item</th><th>Type</th><th>Amt</th></tr></thead><tbody>";
        for (const item of r.line_items) {
          html += `<tr>
            <td>
              <strong>${esc(item.name)}</strong>
              ${
                item.note
                  ? `<div class="note">⚠️ ${esc(item.note)}</div>`
                  : ""
              }
            </td>
            <td>${esc(item.category || "")}</td>
            <td>${esc(item.amount || "")}</td>
          </tr>`;
        }
        html += "</tbody>";
        lineTable.innerHTML = html;
      } else {
        sectionLines.style.display = "none";
      }

      if (r.red_flags && r.red_flags.length) {
        sectionFlags.style.display = "block";
        flags.innerHTML = r.red_flags
          .map(
            (f) => `
          <div class="flag-card ${
            (f.severity || "").toLowerCase() || "medium"
          }">
            <div class="flag-icon"><i data-lucide="${
              f.severity === "HIGH"
                ? "alert-triangle"
                : f.severity === "MEDIUM"
                ? "alert-circle"
                : "info"
            }"></i></div>
            <div>
              <div class="flag-title">${esc(f.title)}${
              f.amount_involved ? " — " + esc(f.amount_involved) : ""
            }</div>
              <div class="flag-desc">${esc(f.description)}</div>
            </div>
          </div>`
          )
          .join("");
      } else {
        sectionFlags.style.display = "none";
        flags.innerHTML = "";
      }

      if (r.action_plan && r.action_plan.length) {
        sectionSteps.style.display = "block";
        steps.innerHTML = r.action_plan
          .map(
            (s, i) => `
          <div class="step-item">
            <div class="step-num">${i + 1}</div>
            <div class="step-text">${esc(s)}</div>
          </div>`
          )
          .join("");
      } else {
        sectionSteps.style.display = "none";
        steps.innerHTML = "";
      }

      lucide.createIcons();
    }
  </script>
</body>
</html>
